<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" width="820" height="300" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace">
  <style>
    @keyframes k1 {0%{opacity:0} 3%,100%{opacity:1}}
    @keyframes k2 {0%,12%{opacity:0} 16%,100%{opacity:1}}
    @keyframes k3 {0%,24%{opacity:0} 28%,100%{opacity:1}}
    @keyframes k4 {0%,36%{opacity:0} 40%,100%{opacity:1}}
    @keyframes k5 {0%,48%{opacity:0} 52%,100%{opacity:1}}
    @keyframes k6 {0%,62%{opacity:0} 66%,100%{opacity:1}}
    @keyframes k7 {0%,78%{opacity:0} 82%,100%{opacity:1}}
    @keyframes blink {0%,49%{opacity:1} 50%,100%{opacity:0}}
    .l {opacity:0}
    .l1{animation:k1 10s infinite} .l2{animation:k2 10s infinite} .l3{animation:k3 10s infinite}
    .l4{animation:k4 10s infinite} .l5{animation:k5 10s infinite} .l6{animation:k6 10s infinite} .l7{animation:k7 10s infinite}
    .cur{animation:blink 1.1s steps(1) infinite}
    text{font-size:13px}
  </style>

  <!-- window -->
  <rect width="820" height="300" rx="14" fill="#0b0e14"/>
  <rect width="820" height="40" rx="14" fill="#11151c"/>
  <rect y="26" width="820" height="14" fill="#11151c"/>
  <circle cx="24" cy="20" r="6" fill="#F85149"/>
  <circle cx="46" cy="20" r="6" fill="#FBBF24"/>
  <circle cx="68" cy="20" r="6" fill="#34D399"/>
  <text x="92" y="25" fill="#7a8699" font-size="12">aether — live console</text>

  <!-- log lines -->
  <text class="l l1" x="22" y="74"  fill="#58A6FF">aether › deploy minecraft-paper · node eu-west-1</text>
  <text class="l l2" x="22" y="100" fill="#8FE3F2">[Aether] Pulling image itzg/minecraft-server:java21…</text>
  <text class="l l3" x="22" y="126" fill="#8FE3F2">[Aether] Building container · 6 GB RAM · 300% CPU</text>
  <text class="l l4" x="22" y="152" fill="#8FE3F2">[Aether] Starting server…</text>
  <text class="l l5" x="22" y="178" fill="#C9D1D9">[12:04:18] [Server thread/INFO]: Minecraft 1.21.4</text>
  <text class="l l6" x="22" y="204" fill="#C9D1D9">[12:04:24] [Server thread/INFO]: Done (5.812s)! For help, type "help"</text>
  <text class="l l7" x="22" y="236" fill="#34D399">● RUNNING — play.aether.host · 12ms · 0/40 players</text>

  <rect class="cur" x="22" y="258" width="9" height="15" fill="#22B8D8"/>
</svg>
