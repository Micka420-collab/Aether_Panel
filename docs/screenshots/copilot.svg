<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Inter, system-ui, sans-serif" width="1280" height="720">
  <defs>
    <linearGradient id="cv" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#22B8D8"/><stop offset="100%" stop-color="#7C5CFF"/></linearGradient>
    <radialGradient id="orb" cx="50%" cy="0%" r="80%"><stop offset="0%" stop-color="#7C5CFF" stop-opacity="0.12"/><stop offset="60%" stop-color="#07090F" stop-opacity="0"/></radialGradient>
    <linearGradient id="send" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#22B8D8"/><stop offset="100%" stop-color="#7C5CFF"/></linearGradient>
  </defs>

  <!-- backdrop -->
  <rect width="1280" height="720" fill="#07090F"/>
  <rect width="1280" height="720" fill="url(#orb)"/>

  <!-- sidebar -->
  <rect x="0" y="0" width="248" height="720" fill="#0A0E18"/>
  <line x1="248" y1="0" x2="248" y2="720" stroke="#ffffff" stroke-opacity="0.07"/>
  <rect x="24" y="26" width="26" height="26" rx="7" fill="#0E1422"/>
  <path d="M37 31 L46 50 H41 L37 40 L33 50 H28 Z" fill="url(#cv)"/>
  <text x="60" y="44" fill="#fff" font-size="17" font-weight="600">Aether</text>
  <rect x="24" y="70" width="200" height="40" rx="11" fill="url(#cv)"/>
  <text x="124" y="95" fill="#fff" font-size="13.5" font-weight="600" text-anchor="middle">+  New server</text>
  <rect x="20" y="130" width="208" height="40" rx="11" fill="#ffffff" fill-opacity="0.10"/>
  <text x="44" y="155" fill="#fff" font-size="13.5">▣  Servers</text>
  <text x="44" y="199" fill="#9aa6b8" font-size="13.5">◈  Blueprints</text>
  <text x="44" y="239" fill="#9aa6b8" font-size="13.5">💳  Billing</text>
  <text x="44" y="279" fill="#9aa6b8" font-size="13.5">⚙  Account</text>
  <text x="44" y="319" fill="#9aa6b8" font-size="13.5">🛡  Admin</text>
  <text x="44" y="359" fill="#9aa6b8" font-size="13.5">📖  Docs</text>
  <rect x="20" y="636" width="208" height="62" rx="13" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.08"/>
  <circle cx="48" cy="667" r="16" fill="url(#cv)"/>
  <text x="48" y="672" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">MD</text>
  <text x="74" y="662" fill="#fff" font-size="12.5" font-weight="600">micka</text>
  <text x="74" y="679" fill="#7a8699" font-size="11">micka@aether.host</text>

  <!-- main -->
  <text x="288" y="44" fill="#8b95a7" font-size="12.5">←  All servers</text>

  <!-- header card -->
  <rect x="288" y="60" width="968" height="116" rx="16" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.09"/>
  <rect x="312" y="84" width="58" height="58" rx="14" fill="#0E1422" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="341" y="124" font-size="30" text-anchor="middle">🟩</text>
  <text x="388" y="104" fill="#fff" font-size="22" font-weight="700">Survival SMP</text>
  <rect x="560" y="88" width="96" height="24" rx="12" fill="#34D399" fill-opacity="0.12" stroke="#34D399" stroke-opacity="0.4"/>
  <circle cx="576" cy="100" r="4" fill="#34D399"/>
  <text x="588" y="104" fill="#34D399" font-size="12" font-weight="600">Running</text>
  <text x="388" y="132" fill="#8FE3F2" font-size="13.5" font-family="ui-monospace, monospace">play.aether.host  ⧉</text>
  <g font-size="12.5" font-weight="600">
    <rect x="892" y="98" width="78" height="36" rx="10" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/><text x="931" y="121" fill="#34D399" text-anchor="middle">▶ Start</text>
    <rect x="980" y="98" width="92" height="36" rx="10" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/><text x="1026" y="121" fill="#e6edf6" text-anchor="middle">⟳ Restart</text>
    <rect x="1082" y="98" width="78" height="36" rx="10" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/><text x="1121" y="121" fill="#FBBF24" text-anchor="middle">■ Stop</text>
    <rect x="1170" y="98" width="44" height="36" rx="10" fill="#F85149" fill-opacity="0.14" stroke="#F85149" stroke-opacity="0.4"/><text x="1192" y="121" fill="#F85149" text-anchor="middle">⚡</text>
  </g>

  <!-- stat tiles -->
  <g>
    <rect x="288" y="192" width="186" height="74" rx="12" fill="#000" fill-opacity="0.2" stroke="#ffffff" stroke-opacity="0.05"/>
    <text x="306" y="218" fill="#7a8699" font-size="11.5">⚡ CPU</text>
    <text x="306" y="246" fill="#fff" font-size="19" font-weight="700">38%</text>
    <text x="306" y="261" fill="#5d6b7e" font-size="10">76% raw</text>
    <rect x="486" y="192" width="186" height="74" rx="12" fill="#000" fill-opacity="0.2" stroke="#ffffff" stroke-opacity="0.05"/>
    <text x="504" y="218" fill="#7a8699" font-size="11.5">▣ Memory</text>
    <text x="504" y="246" fill="#fff" font-size="19" font-weight="700">3.2 GB</text>
    <text x="504" y="261" fill="#5d6b7e" font-size="10">of 6 GB</text>
    <rect x="684" y="192" width="186" height="74" rx="12" fill="#000" fill-opacity="0.2" stroke="#ffffff" stroke-opacity="0.05"/>
    <text x="702" y="218" fill="#7a8699" font-size="11.5">▤ Disk</text>
    <text x="702" y="246" fill="#fff" font-size="19" font-weight="700">4.1 GB</text>
    <text x="702" y="261" fill="#5d6b7e" font-size="10">of 50 GB</text>
    <rect x="882" y="192" width="186" height="74" rx="12" fill="#000" fill-opacity="0.2" stroke="#ffffff" stroke-opacity="0.05"/>
    <text x="900" y="218" fill="#7a8699" font-size="11.5">👥 Players</text>
    <text x="900" y="246" fill="#fff" font-size="19" font-weight="700">7/20</text>
    <text x="900" y="261" fill="#5d6b7e" font-size="10">online</text>
    <rect x="1080" y="192" width="176" height="74" rx="12" fill="#000" fill-opacity="0.2" stroke="#ffffff" stroke-opacity="0.05"/>
    <text x="1098" y="218" fill="#7a8699" font-size="11.5">⏱ Uptime</text>
    <text x="1098" y="246" fill="#fff" font-size="19" font-weight="700">2d 4h</text>
  </g>

  <!-- tabs -->
  <g font-size="13">
    <text x="290" y="300" fill="#7a8699">Console</text>
    <text x="372" y="300" fill="#fff" font-weight="600">✦ Copilot</text>
    <text x="462" y="300" fill="#7a8699">Stats</text>
    <text x="520" y="300" fill="#7a8699">Content</text>
    <text x="596" y="300" fill="#7a8699">Mod Doctor</text>
    <text x="694" y="300" fill="#7a8699">Backups</text>
    <text x="772" y="300" fill="#7a8699">Network</text>
    <text x="848" y="300" fill="#7a8699">Proxy</text>
    <rect x="372" y="312" width="82" height="2.5" rx="1" fill="#22B8D8"/>
    <line x1="288" y1="313" x2="1256" y2="313" stroke="#ffffff" stroke-opacity="0.07"/>
  </g>

  <!-- copilot panel -->
  <rect x="288" y="332" width="968" height="360" rx="14" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.08"/>
  <!-- panel header -->
  <rect x="288" y="332" width="968" height="40" rx="14" fill="#ffffff" fill-opacity="0.03"/>
  <circle cx="312" cy="352" r="9" fill="url(#cv)"/>
  <text x="312" y="356" font-size="10" fill="#07090F" font-weight="700" text-anchor="middle">✦</text>
  <text x="330" y="357" fill="#fff" font-size="12.5" font-weight="600">AI Server Copilot</text>
  <rect x="452" y="343" width="84" height="18" rx="9" fill="#34D399" fill-opacity="0.12" stroke="#34D399" stroke-opacity="0.35"/>
  <text x="494" y="356" fill="#34D399" font-size="10" font-weight="600" text-anchor="middle">● online</text>
  <text x="1230" y="357" fill="#7a8699" font-size="11.5" text-anchor="end">⟲ New chat</text>
  <line x1="289" y1="372" x2="1255" y2="372" stroke="#ffffff" stroke-opacity="0.07"/>

  <!-- chat thread -->
  <!-- user bubble 1 (right, cyan tint) -->
  <rect x="876" y="386" width="368" height="34" rx="13" fill="#22B8D8" fill-opacity="0.10" stroke="#22B8D8" stroke-opacity="0.30"/>
  <text x="1224" y="407" fill="#e6edf6" font-size="12.5" text-anchor="end">Why won't my server start? It just crashes on boot.</text>

  <!-- assistant reply 1 (left, glass) -->
  <circle cx="312" cy="442" r="11" fill="url(#cv)"/>
  <text x="312" y="446" font-size="10" fill="#07090F" font-weight="700" text-anchor="middle">✦</text>
  <rect x="330" y="430" width="612" height="80" rx="13" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.09"/>
  <text x="348" y="452" fill="#fff" font-size="12.5" font-weight="600">Copilot</text>
  <text x="348" y="472" fill="#C9D1D9" font-size="12">Your crash log shows a Java / loader mismatch. The pack targets <tspan fill="#8FE3F2">Fabric 1.21.4</tspan></text>
  <text x="348" y="490" fill="#C9D1D9" font-size="12">on <tspan fill="#8FE3F2">Java 21</tspan>, but this server is running <tspan fill="#FBBF24">Java 17</tspan> — Fabric refuses to boot. Bump</text>
  <text x="348" y="500" fill="#C9D1D9" font-size="12">the runtime to Java 21 and the world will load cleanly.</text>

  <!-- user bubble 2 -->
  <rect x="956" y="524" width="288" height="30" rx="13" fill="#22B8D8" fill-opacity="0.10" stroke="#22B8D8" stroke-opacity="0.30"/>
  <text x="1224" y="543" fill="#e6edf6" font-size="12.5" text-anchor="end">Can you fix it for me?</text>

  <!-- assistant reply 2 -->
  <circle cx="312" cy="576" r="11" fill="url(#cv)"/>
  <text x="312" y="580" font-size="10" fill="#07090F" font-weight="700" text-anchor="middle">✦</text>
  <rect x="330" y="564" width="612" height="44" rx="13" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.09"/>
  <text x="348" y="585" fill="#C9D1D9" font-size="12">Done — I switched the runtime to <tspan fill="#8FE3F2">Java 21 (Temurin)</tspan> and queued a restart.</text>
  <text x="348" y="601" fill="#C9D1D9" font-size="12">Want me to apply any of these while we're at it?</text>

  <!-- suggested command chips -->
  <g font-size="11.5" font-family="ui-monospace, 'JetBrains Mono', monospace">
    <rect x="348" y="620" width="118" height="26" rx="13" fill="#22B8D8" fill-opacity="0.06" stroke="#22B8D8" stroke-opacity="0.5"/>
    <text x="407" y="637" fill="#8FE3F2" text-anchor="middle">/whitelist on</text>
    <rect x="476" y="620" width="158" height="26" rx="13" fill="#22B8D8" fill-opacity="0.06" stroke="#22B8D8" stroke-opacity="0.5"/>
    <text x="555" y="637" fill="#8FE3F2" text-anchor="middle">set difficulty hard</text>
    <rect x="644" y="620" width="90" height="26" rx="13" fill="#22B8D8" fill-opacity="0.06" stroke="#22B8D8" stroke-opacity="0.5"/>
    <text x="689" y="637" fill="#8FE3F2" text-anchor="middle">restart</text>
    <rect x="744" y="620" width="120" height="26" rx="13" fill="#7C5CFF" fill-opacity="0.06" stroke="#7C5CFF" stroke-opacity="0.5"/>
    <text x="804" y="637" fill="#C9B6FF" text-anchor="middle">view crash log</text>
  </g>

  <!-- input box -->
  <rect x="306" y="658" width="800" height="24" rx="12" fill="#0E1422" stroke="#ffffff" stroke-opacity="0.10"/>
  <text x="324" y="674" fill="#7a8699" font-size="12.5">Ask the Copilot…</text>
  <!-- gradient send button -->
  <rect x="1116" y="656" width="124" height="28" rx="14" fill="url(#send)"/>
  <text x="1178" y="674" fill="#fff" font-size="12.5" font-weight="600" text-anchor="middle">Send  ➤</text>

  <!-- powered-by caption -->
  <text x="306" y="703" fill="#5d6b7e" font-size="10">✦ Powered by Claude (or rule-based offline)</text>
  <text x="1240" y="703" fill="#5d6b7e" font-size="10" text-anchor="end">Enter to send · Shift+Enter for newline</text>
</svg>
